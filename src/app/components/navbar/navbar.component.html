                <i class="bi" [ngClass]="isMenuOpen ? 'bi-x' : 'bi-grid-fill'"></i>

            <div class="collapse navbar-collapse" [class.show]="isMenuOpen" id="mainNav" #navbarCollapse>

                    @for (item of navLinks; track item.id) {
                    <li class="nav-item">
                        <a class="nav-link px-4 rounded-pill" routerLink="{{item.path}}" routerLinkActive="active-pill"
                            [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">{{item.name}}</a>
                    </li>
                    }
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <button (click)="toggleTheme()" class="btn btn-icon rounded-circle p-2 border-0 shadow-none"
                        [title]="isDarkMode ? 'Switch to Light' : 'Switch to Dark'">
                        <i class="bi fs-5"
                            [ngClass]="isDarkMode ? 'bi-sun-fill text-warning' : 'bi-moon-stars-fill text-primary'"></i>
                    </button>

                    <a routerLink="/list-property"
