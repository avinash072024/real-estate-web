<nav class="navbar navbar-expand-lg fixed-top transition-all"
    [ngClass]="isScrolled ? 'nav-scrolled shadow-sm' : 'nav-transparent'">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3 d-flex align-items-center" routerLink="/" (click)="closeMenu()">
            <i class="bi bi-houses-fill text-primary me-2"></i>
            <span class="logo-text">{{appName1}}<span class="text-primary"> {{appName2}}</span></span>
        </a>

        <div class="d-flex align-items-center gap-2 d-lg-none">
            <app-theme-toggler />
            <button class="theme-toggle-btn shadow" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#mobileMenu" aria-controls="mobileMenu">
                <i class="bi bi-grid-fill"></i>
            </button>
        </div>

        <div class="collapse navbar-collapse d-none d-lg-block">
            <ul class="navbar-nav mx-auto gap-2">
                @for (item of navLinks; track item.id) {
                <li class="nav-item">
                    <a class="nav-link px-3 rounded-pill fw-semibold" routerLink="{{item.path}}"
                        routerLinkActive="active-pill" [routerLinkActiveOptions]="{exact: true}">{{item.name}}</a>
                </li>
                }
            </ul>
            <div class="d-flex align-items-center gap-3">
                <app-theme-toggler />
                <a routerLink="/list-property" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">List
                    Property</a>
            </div>
        </div>
    </div>
</nav>

<div class="offcanvas offcanvas-end border-0" data-bs-backdrop="static" tabindex="-1" id="mobileMenu"
    aria-labelledby="mobileMenuLabel">

    <div class="offcanvas-header border-bottom p-4">
        <h5 class="offcanvas-title fw-bold" id="mobileMenuLabel">Navigation</h5>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>

    <div class="offcanvas-body p-4 d-flex flex-column">
        <ul class="navbar-nav gap-3">
            @for (item of navLinks; track item.id) {
            <li class="nav-item">
                <a class="nav-link fs-5 fw-medium py-3 px-4 rounded-5 bg-body-tertiary d-flex justify-content-between align-items-center"
                    routerLink="{{item.path}}" routerLinkActive="active-mobile" data-bs-dismiss="offcanvas">
                    {{item.name}}
                    <i class="bi bi-arrow-right-short opacity-50"></i>
                </a>
            </li>
            }
        </ul>

        <div class="mt-auto">
            <a routerLink="/list-property" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow"
                data-bs-dismiss="offcanvas">
                List Your Property
            </a>
        </div>
    </div>
</div>
